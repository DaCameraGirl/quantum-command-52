name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web-dashboard/**"
      - "data/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-dashboard/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dashboard dependencies
        working-directory: web-dashboard
        run: npm ci
      - name: Install Python export dependencies
        working-directory: web-dashboard
        run: pip install -r requirements.txt
      - name: Export static demo data
        working-directory: web-dashboard
        run: python scripts/export_pages_demo.py
      - name: Build dashboard for Pages
        working-directory: web-dashboard
        env:
          GITHUB_PAGES: "true"
        run: npm run build
      - name: Add Pages marker
        working-directory: web-dashboard/dist
        run: touch .nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4