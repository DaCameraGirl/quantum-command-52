name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web-dashboard/**"
      - "data/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-dashboard/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dashboard dependencies
        working-directory: web-dashboard
        run: npm ci
      - name: Install Python export dependencies
        working-directory: web-dashboard
        run: pip install -r requirements.txt
      - name: Export static demo data
        working-directory: web-dashboard
        run: python scripts/export_pages_demo.py
      - name: Build dashboard for Pages
        working-directory: web-dashboard
        env:
          GITHUB_PAGES: "true"
        run: npm run build
      - name: Add Pages marker
        working-directory: web-dashboard/dist
        run: touch .nojekyll
      - name: Publish to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: web-dashboard/dist
          clean: true