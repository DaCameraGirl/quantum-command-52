services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quantum_command_52}
      POSTGRES_USER: ${POSTGRES_USER:-quantum_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quantum_app} -d ${POSTGRES_DB:-quantum_command_52}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-quantum_app}:${POSTGRES_PASSWORD:-change-me-in-env}@postgres:5432/${POSTGRES_DB:-quantum_command_52}
      DATABASE_POOL_MIN: ${DATABASE_POOL_MIN:-1}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      APP_ENV: ${APP_ENV:-production}
      REQUIRE_ALEMBIC_MIGRATIONS: ${REQUIRE_ALEMBIC_MIGRATIONS:-true}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: 8787
      DATABASE_URL: postgresql://${POSTGRES_USER:-quantum_app}:${POSTGRES_PASSWORD:-change-me-in-env}@postgres:5432/${POSTGRES_DB:-quantum_command_52}
      DATABASE_POOL_MIN: ${DATABASE_POOL_MIN:-1}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      APP_ENV: ${APP_ENV:-production}
      REQUIRE_ALEMBIC_MIGRATIONS: ${REQUIRE_ALEMBIC_MIGRATIONS:-true}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-1209600}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://127.0.0.1:8080,http://localhost:8080}
      RATE_LIMIT_AUTH_PER_MINUTE: ${RATE_LIMIT_AUTH_PER_MINUTE:-12}
      RATE_LIMIT_API_PER_MINUTE: ${RATE_LIMIT_API_PER_MINUTE:-120}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://127.0.0.1:8080/?checkout=success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://127.0.0.1:8080/?checkout=cancelled}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8787"

volumes:
  postgres_data:
