services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quantum_command_52}
      POSTGRES_USER: ${POSTGRES_USER:-quantum_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quantum_app} -d ${POSTGRES_DB:-quantum_command_52}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: web-dashboard/Dockerfile.backend
    environment:
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: 8787
      DATABASE_URL: postgresql://${POSTGRES_USER:-quantum_app}:${POSTGRES_PASSWORD:-change-me-in-env}@postgres:5432/${POSTGRES_DB:-quantum_command_52}
      DATABASE_POOL_MIN: ${DATABASE_POOL_MIN:-1}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-1209600}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://127.0.0.1:8080,http://localhost:8080}
      RATE_LIMIT_AUTH_PER_MINUTE: ${RATE_LIMIT_AUTH_PER_MINUTE:-12}
      RATE_LIMIT_API_PER_MINUTE: ${RATE_LIMIT_API_PER_MINUTE:-120}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8787:8787"

  frontend:
    build:
      context: .
      dockerfile: web-dashboard/Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
