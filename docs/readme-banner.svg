<svg xmlns="http://www.w3.org/2000/svg" width="920" height="220" viewBox="0 0 920 220" role="img" aria-label="Quantum Command 52">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="50%" stop-color="#12102a"/>
      <stop offset="100%" stop-color="#0d1b33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bc8cff"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bc8cff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#bc8cff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="920" height="220" rx="18" fill="url(#bg)"/>
  <rect x="-200" y="0" width="240" height="220" rx="18" fill="url(#shimmer)" opacity="0.9">
    <animate attributeName="x" values="-240;920" dur="7s" repeatCount="indefinite"/>
  </rect>
  <rect x="1" y="1" width="918" height="218" rx="17" fill="none" stroke="#bc8cff" stroke-width="2" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.65;0.35" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <g transform="translate(96,110)">
    <ellipse rx="42" ry="18" fill="none" stroke="#bc8cff" stroke-width="1.5" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse rx="42" ry="18" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="60" to="420" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse rx="42" ry="18" fill="none" stroke="#bc8cff" stroke-width="1.5" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="120" to="480" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <circle r="8" fill="#58a6ff">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="170" y="92" fill="#f8fbff" font-family="Segoe UI, system-ui, sans-serif" font-size="38" font-weight="800">Quantum Command 52</text>
  <text x="170" y="126" fill="#9db4d1" font-family="Segoe UI, system-ui, sans-serif" font-size="17" font-weight="500">Quantum computing command center — simulation, visualization, and ops in the browser.</text>
  <rect x="170" y="148" width="88" height="28" rx="14" fill="rgba(188,140,255,0.14)" stroke="#bc8cff66" stroke-width="1">
    <animate attributeName="opacity" values="1;0.75;1" dur="2.5s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <text x="214" y="167" fill="#bc8cff" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">QUANTUM</text>
  <rect x="270" y="148" width="104" height="28" rx="14" fill="rgba(188,140,255,0.14)" stroke="#58a6ff66" stroke-width="1">
    <animate attributeName="opacity" values="1;0.75;1" dur="2.5s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  <text x="322" y="167" fill="#58a6ff" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">SIMULATION</text>
</svg>